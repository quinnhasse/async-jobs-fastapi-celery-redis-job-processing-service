# fly.toml — Fly.io app configuration
# Deploy with: fly deploy

app = "async-jobs"
primary_region = "ord"

[build]
  dockerfile = "Dockerfile"

[env]
  LOG_LEVEL = "INFO"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    path = "/healthz"
    protocol = "http"
    timeout = "5s"

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

[processes]
  app = "uvicorn app.main:app --host 0.0.0.0 --port 8000"
  worker = "celery -A app.worker.celery_app worker --loglevel=info --queues=default --concurrency=4"

[[mounts]]
  # No persistent mounts needed — state is in Postgres
